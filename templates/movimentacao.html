<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">
        <div>Saldo atual</div>
        <div class="saldo">R${{ saldo.valor | round(2) }}</div>
        <h2>Nova movimentação</h2>

        <form method="post">

            <input type="hidden" name="tipo" value="{{ tipo }}">

            <label>Valor</label>
            <input type="number" step="0.01" name="valor" required>

            <label>Categoria</label>
            <select name="categoria" id="categoria-select">
            </select>

            <label>Descrição</label>
            <input type="text" name="descricao">

            <button type="submit">Salvar</button>

        </form>

        <a href="/"><button>Voltar</button></a>

    </div>

</div>

<div id="categorias-data" data-receita='{{ categorias_receita|tojson|safe }}' data-despesa='{{ categorias_despesa|tojson|safe }}'></div>

<script>
    const tipo = "{{ tipo }}";
    const categoriaSelect = document.getElementById('categoria-select');
    const categoriasData = document.getElementById('categorias-data');

    const categorias = {
        receita: JSON.parse(categoriasData.dataset.receita),
        despesa: JSON.parse(categoriasData.dataset.despesa)
    };

    function updateCategorias() {
        categoriaSelect.innerHTML = '';

        for (const [key, value] of Object.entries(categorias[tipo])) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = key;
            categoriaSelect.appendChild(option);
        }
    }
    updateCategorias();

    tipoSelect.addEventListener('change', updateCategorias);
    updateCategorias();
</script>
</body>
</html>
